<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>학습 탐사록</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>학습 탐사록</h1>

  <section>
    <h2>탐사자</h2>
    <input id="explorerName" placeholder="이름">
    <input id="explorerAlias" placeholder="별칭">
    <input id="explorerTheme" placeholder="테마">
    <button id="addExplorerButton">탐사자 추가</button>
    <select id="explorerSelect"></select>
    <div id="explorerList"></div>
  </section>

  <section>
    <h2>과목</h2>
    <input id="subjectName" placeholder="과목 이름">
    <button id="addSubjectButton">과목 추가</button>
    <div id="subjectList"></div>
  </section>

  <section>
    <h2>퀘스트</h2>
    <input id="questTitle" placeholder="퀘스트 이름">
    <select id="subjectSelect"></select>
    <select id="questType">
      <option value="탐사">탐사</option>
      <option value="해석">해석</option>
      <option value="판정">판정</option>
      <option value="복구">복구</option>
    </select>
    <select id="questDifficulty">
      <option value="낮음">낮음</option>
      <option value="보통">보통</option>
      <option value="높음">높음</option>
    </select>
    <textarea id="questMemo" placeholder="메모"></textarea>
    <button id="addQuestButton">퀘스트 추가</button>
    <div id="questList"></div>
  </section>

  <section>
    <h2>성장치</h2>
    <div id="growthBox"></div>
  </section>

  <section>
    <h2>타이머</h2>
    <input id="timerMinutes" type="number" placeholder="분">
    <button id="startTimerButton">시작</button>
    <button id="stopTimerButton">정지</button>
    <button id="resetTimerButton">리셋</button>
    <div id="timerDisplay">00:00</div>
    <div id="timerPraise"></div>
  </section>

  <script src="storage.js"></script>
  <script src="explorers.js"></script>
  <script src="subjects.js"></script>
  <script src="quests.js"></script>
  <script src="growth.js"></script>
  <script src="timer.js"></script>
  <script src="app.js"></script>
</body>
</html>
